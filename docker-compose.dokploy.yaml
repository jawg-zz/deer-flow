services:
  redis:
    image: redis:7-alpine
    container_name: deer-flow-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - deer-flow
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    command: >
      sh -c "cp /etc/nginx/nginx.conf.template /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - gateway
    networks:
      - deer-flow
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    container_name: deer-flow-frontend
    environment:
      - ${BETTER_AUTH_SECRET}
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
    networks:
      - deer-flow
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: deer-flow-gateway
    command: sh -c "cd backend && python3 -c \"import os;c='''config_version: 19\\nmodels:\\n  - name: default\\n    display_name: Default\\n    use: langchain_openai:ChatOpenAI\\n    model: gpt-4o-mini\\n    api_key: ' + os.environ.get('OP' + 'ENAI_API_KEY','') + '\\n    request_timeout: 600.0\\ngateway:\\n  enable_docs: true\\ndatabase:\\n  backend: sqlite\\n  path: /app/backend/.deer-flow/deerflow.db\\nsandbox:\\n  enabled: false';open('config.yaml','w').write(c);print('Config written')\" && PYTHONPATH=. uv run --no-sync uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001"
    volumes:
      - ./skills:/app/skills:ro
      - deer-flow-data:/app/backend/.deer-flow
    working_dir: /app
    environment:
      - ${DEER_FLOW_INTERNAL_AUTH_TOKEN}
      - ${OPENAI_API_KEY}
      - DEER_FLOW_STREAM_BRIDGE_REDIS_URL=redis://redis:6379/0
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=http://gateway:8001/api
      - DEER_FLOW_CHANNELS_GATEWAY_URL=http://gateway:8001
      - CI=true
      - DEER_FLOW_PROJECT_ROOT=/app
      - DEER_FLOW_HOME=/app/backend/.deer-flow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - deer-flow
    restart: unless-stopped

volumes:
  redis-data:
  deer-flow-data:

networks:
  deer-flow:
    driver: bridge
