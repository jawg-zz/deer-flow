# DeerFlow default config for Dokploy deployments
config_version: 19
log_level: info
token_usage:
  enabled: true
models:
  - name: default
    display_name: Default
    use: langchain_openai:ChatOpenAI
    model: gpt-4o-mini
    api_key: not-set-replace-with-real-key
    request_timeout: 600.0
    supports_vision: true
gateway:
  enable_docs: true
  cors_origins: "*"
database:
  backend: sqlite
  path: /app/backend/.deer-flow/deerflow.db
sandbox:
  use: deerflow.community.aio_sandbox:AioSandboxProvider
  enabled: false
skills:
  enabled: true
  paths:
    - /app/skills
suggestions:
  enabled: false
